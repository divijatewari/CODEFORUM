{% extends "layout.html" %}

{% block content %}

<h1 class="text-2xl font-bold mb-4">Semester 4 Subjects</h1>

<div class="grid grid-cols-2 gap-4">

{% for subject in subjects %}

<a href="/subject/{{subject.id}}" class="bg-white p-6 shadow rounded hover:bg-gray-50">

<h2 class="text-lg font-semibold">
{{subject.name}}
</h2>

</a>

{% endfor %}

</div>

{% endblock %}
